name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install cairo (Mac)
        run: brew install cairo

      - name: Build Mac app
        run: |
          pyinstaller --windowed --name "MusicPlayer" \
            --add-data "assets:assets" \
            src/main.py

      - name: Upload Mac build
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-Mac
          path: dist/MusicPlayer.app

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows app
        run: |
          pyinstaller --windowed --name "MusicPlayer" --add-data "assets;assets" src/main.py

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-Windows
          path: dist/MusicPlayer